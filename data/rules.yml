version: "3.1"

rules:

- rule: Always return to the interview
  steps:
  - intent: out_of_scope
  - action: utter_out_of_scope

- rule: Say 'I am a bot' anytime the user challenges
  steps:
  - intent: bot_challenge
  - action: utter_iamabot

- rule: Process soft skills after asking
  steps:
  - action: action_ask_soft_skills
  - intent: provide_soft_skills
  - action: action_set_soft_skills
  - action: action_evaluate_candidate