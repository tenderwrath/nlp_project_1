version: "3.1"

stories:
- story: bot challenge
  steps:
  - user: |
      Ты бот?
    intent: bot_challenge
  - action: utter_iamabot

- story: out of scope
  steps:
  - user: |
      Какая сегодня погода?
    intent: out_of_scope
  - action: utter_out_of_scope

- story: greet 
  steps:
  - user: |
      Здравствуйте!
    intent: greet
  - action: utter_greet
  - action: interview_form

- story: say goodbye
  steps:
  - user: |
      До свидания!
    intent: goodbye
  - action: utter_goodbye

- story: unknown role response
  steps:
  - user: |
      Хочу на роль тестировщика
    intent: provide_unknown_desired_role
  - action: utter_unknown_desired_role

- story: dont know response
  steps:
  - user: |
      Не знаю, не было такого
    intent: dont_know
  - action: utter_dont_know